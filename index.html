<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정부 지원금·보조금 안내</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        html { scrollbar-width: thin; scrollbar-color: #444 #1a1a1a; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            line-height: 1.5;
            padding: 12px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab {
            flex-shrink: 0;
            padding: 8px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab:hover { border-color: #555; }
        .tab.active {
            background: linear-gradient(135deg, #1e40af, #1e3a8a);
            border-color: #3b82f6;
            color: #fff;
        }
        .tab .icon { font-size: 14px; display: block; margin-bottom: 2px; }
        .tab .count { font-size: 14px; font-weight: 700; display: block; margin-top: 2px; }
        .header {
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        .header h1 { font-size: 16px; margin-bottom: 4px; color: #fff; }
        .header p { font-size: 11px; color: rgba(255,255,255,0.6); }
        .header .stat {
            display: inline-block;
            margin-top: 12px;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 8px;
        }
        .header .stat-num { font-size: 20px; font-weight: 700; }
        .header .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.5); }
        .list { display: flex; flex-direction: column; gap: 8px; }
        .card {
            background: #141414;
            border: 1px solid #252525;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #444; }
        .card-main { padding: 14px; }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 6px;
        }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #E3E3E3
            flex: 1;
        }
        .card-org {
            font-size: 10px;
            color: #888;
            background: #252525;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .card-target {
            font-size: 12px;
            color: #888;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-arrow {
            float: right;
            color: #555;
            transition: transform 0.3s;
            margin-top: -20px;
        }
        .card.open .card-arrow { transform: rotate(180deg); }
        .card-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #0f0f0f;
        }
        .card.open .card-detail { max-height: 500px; }
        .card-detail-inner {
            padding: 14px;
            border-top: 1px solid #222;
        }
        .detail-section {
            margin-bottom: 12px;
        }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }
        .detail-value {
            font-size: 13px;
            color: #bbb;
            line-height: 1.6;
        }
        .detail-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: #1e40af;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            padding: 16px 0 8px;
            font-size: 10px;
            color: #444;
        }
        .footer a { color: #60a5fa; text-decoration: none; }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
        }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>
    <div class="tabs" id="tabs"></div>
    <div id="contents"></div>
    <div class="footer">
        자료: <a href="https://www.gov.kr/portal/rcvfvrSvc/main" target="_blank">정부24 보조금24</a><br>
        업데이트: <span id="update-time"></span>
    </div>

    <script>
        const DATA = {"updateTime": "2026-04-15 02:26", "total": 1, "youth": {"count": 1, "items": [{"name": "6ㆍ25전사자(미수습) 유가족 유전자 채취 포상금 및 전사자 유해 소재 제보 포상금 지급 안내", "org": "국방부", "target": "○ 6ㆍ25전쟁 전사자 유가족 중에서 유해를 찾지 못한 8촌 이내의 친ㆍ인척\r\n - 전사자 1명 기준 최대 4명까지 DNA 시료채취\r\n\r\n○ 6ㆍ25전쟁 당시 전사자의 유해 매장지", "content": "○ 6ㆍ25전사자 유가족 DNA 시료채취\r\n - 채취 대상 : 6ㆍ25전쟁 전사자(군인, 군무원, 경찰공무원, 소년지원병, 종군 기자, 학도병, 청년단원, 향토방위대원 등)의 유가족 중에서\r\n                      전사자의 유해를 수습하지 못한 유가족(직계 가족 외에 친가, 외가 8촌 이내 친인척 가능)\r\n  ㆍ전사자 기준 최대 4명까지 채", "method": "기타 온라인신청||방문신청||직접입력", "period": "상시신청", "url": "https://www.gov.kr/portal/rcvfvrSvc/dtlEx/129000000082", "phone": "국방부유해발굴감식단/1577-5625"}]}, "senior": {"count": 0, "items": []}, "family": {"count": 0, "items": []}, "disabled": {"count": 0, "items": []}, "lowincome": {"count": 0, "items": []}, "business": {"count": 0, "items": []}, "etc": {"count": 0, "items": []}};
        const CATS = {"youth": {"name": "청년", "icon": "👨‍🎓", "color": "#60a5fa", "bg": "#1e3a5f"}, "senior": {"name": "노인", "icon": "👴", "color": "#c084fc", "bg": "#4a1d6a"}, "family": {"name": "출산/육아", "icon": "👶", "color": "#f472b6", "bg": "#831843"}, "disabled": {"name": "장애인", "icon": "♿", "color": "#4ade80", "bg": "#14532d"}, "lowincome": {"name": "저소득", "icon": "🏠", "color": "#fbbf24", "bg": "#713f12"}, "business": {"name": "소상공인", "icon": "🏪", "color": "#fb923c", "bg": "#7c2d12"}, "etc": {"name": "기타", "icon": "📋", "color": "#94a3b8", "bg": "#334155"}};
        const ORDER = ["youth", "senior", "family", "disabled", "lowincome", "business", "etc"];
        
        let currentTab = ORDER[0];
        
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-id="${tabId}"]`).classList.add('active');
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(`content-${tabId}`).classList.add('active');
        }
        
        function toggleCard(card) {
            const wasOpen = card.classList.contains('open');
            document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
            if (!wasOpen) {
                card.classList.add('open');
                setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
            }
        }
        
        function renderTabs() {
            const tabsEl = document.getElementById('tabs');
            let html = '';
            
            ORDER.forEach(catId => {
                const cat = CATS[catId];
                const count = DATA[catId]?.count || 0;
                html += `
                    <div class="tab" data-id="${catId}" onclick="switchTab('${catId}')">
                        <span class="icon">${cat.icon}</span>
                        ${cat.name}
                        <span class="count">${count}</span>
                    </div>
                `;
            });
            
            tabsEl.innerHTML = html;
        }
        
        function renderContents() {
            const contentsEl = document.getElementById('contents');
            let html = '';
            
            ORDER.forEach((catId, idx) => {
                const cat = CATS[catId];
                const data = DATA[catId] || { count: 0, items: [] };
                const isActive = idx === 0 ? 'active' : '';
                
                html += `
                    <div id="content-${catId}" class="content ${isActive}">
                        <div class="header" style="background: linear-gradient(135deg, ${cat.bg}, #0f0f0f); border: 1px solid ${cat.color}40;">
                            <h1>${cat.icon} ${cat.name} 지원사업</h1>
                            <p>여주시민이 받을 수 있는 ${cat.name} 지원 혜택</p>
                            <div class="stat">
                                <div class="stat-num" style="color:${cat.color}">${data.count}건</div>
                                <div class="stat-lbl">지원사업</div>
                            </div>
                        </div>
                        <div class="list">
                `;
                
                if (data.items.length === 0) {
                    html += '<div class="empty">해당 카테고리의 지원사업이 없습니다</div>';
                } else {
                    data.items.forEach(item => {
                        html += `
                            <div class="card" onclick="toggleCard(this)">
                                <div class="card-main">
                                    <div class="card-top">
                                        <div class="card-name">${item.name}</div>
                                        <div class="card-org">${item.org}</div>
                                    </div>
                                    <div class="card-target">👤 ${item.target || '전체'}</div>
                                    <div class="card-arrow">▼</div>
                                </div>
                                <div class="card-detail">
                                    <div class="card-detail-inner">
                                        <div class="detail-section">
                                            <div class="detail-label">지원대상</div>
                                            <div class="detail-value">${item.target || '-'}</div>
                                        </div>
                                        <div class="detail-section">
                                            <div class="detail-label">지원내용</div>
                                            <div class="detail-value">${item.content || '-'}</div>
                                        </div>
                                        <div class="detail-section">
                                            <div class="detail-label">신청방법</div>
                                            <div class="detail-value">${item.method || '-'}</div>
                                        </div>
                                        <div class="detail-section">
                                            <div class="detail-label">신청기한</div>
                                            <div class="detail-value">${item.period || '상시'}</div>
                                        </div>
                                        ${item.phone ? `
                                        <div class="detail-section">
                                            <div class="detail-label">문의전화</div>
                                            <div class="detail-value">${item.phone}</div>
                                        </div>
                                        ` : ''}
                                        ${item.url ? `<a class="detail-link" href="${item.url}" target="_blank">정부24에서 신청하기 →</a>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += '</div></div>';
            });
            
            contentsEl.innerHTML = html;
        }
        
        function init() {
            document.getElementById('update-time').textContent = DATA.updateTime;
            renderTabs();
            renderContents();
            document.querySelector('.tab').classList.add('active');
        }
        
        init();
    </script>
</body>
</html>
